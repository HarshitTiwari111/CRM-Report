services:
  - type: web
    name: crm-report-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/utils/seed.js && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CLIENT_URL
        sync: false
      # Client and API run on different origins in this setup, so the HttpOnly
      # refresh cookie must be SameSite=None (it is always Secure in production)
      - key: COOKIE_SAMESITE
        value: none
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: web
    name: crm-report-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://crm-report-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
